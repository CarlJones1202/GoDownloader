server:
  host: "0.0.0.0"
  port: 8090
  read_timeout: 30s
  write_timeout: 30s
  idle_timeout: 120s

database:
  path: "godownload.db"
  max_open_conns: 10
  max_idle_conns: 5
  conn_max_lifetime: 5m
  conn_max_idle_time: 1m

crawler:
  workers: 5
  request_timeout: 30s
  rate_limit: 500ms
  max_retries: 3
  user_agent: "GoDownload/1.0"
  crawl_interval: 6h

storage:
  images_dir: "data/images"
  thumbnails_dir: "data/thumbnails"
  videos_dir: "data/videos"
  person_photos_dir: "data/person_photos"

log:
  level: "info"
  format: "text"

wireguard:
  conf_path: "wg.conf"          # path to WireGuard .conf file (leave empty to disable)
  bypass: false          # set true to skip VPN even when configured
  blocked_domains:       # domains that require VPN routing
    - metart.com
    - met-art.com
    - sexart.com
    - thelifeerotic.com
    - eternaldesire.com
    - playboy.com
    - femjoy.com
    - mplstudios.com
